name: ci

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "prompts/**"
      - "data/**"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyyaml
      - name: Run unit tests
        env:
          OPENAI_API_KEY: dummy-not-used-in-unit-tests
        run: pytest tests/ -v
